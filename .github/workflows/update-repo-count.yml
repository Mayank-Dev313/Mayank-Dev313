name: Update Total Repo Count

on:
  schedule:
    - cron: '0 0 * * *'   # runs daily at midnight UTC
  workflow_dispatch:        # allows manual trigger
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get total repo count (public + private)
        id: repo_count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api user --jq '.total_private_repos + .public_repos' 2>/dev/null || gh api user --jq '.public_repos')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Update README badge
        run: |
          BADGE="![Total Repos](https://img.shields.io/badge/Total_Repos-${{ steps.repo_count.outputs.count }}-000000?style=for-the-badge\&logo=github\&logoColor=white)"
          sed -i "s|!\[Total Repos\].*|${BADGE}|g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update total repo count" && git push)
